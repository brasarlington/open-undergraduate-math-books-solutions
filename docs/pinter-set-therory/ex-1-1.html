<h1>Exercise 1.1</h1>

<p>
Let \( A = \{1,2,3\} \) and \( B = \{2,3,4\} \).
</p>

<h2>Solution</h2>

<h3>(1) Union</h3>
<p>
\[
A \cup B = \{1,2,3,4\}.
\]
</p>

<h3>(2) Intersection</h3>
<p>
\[
A \cap B = \{2,3\}.
\]
</p>

<h3>(3) Membership</h3>
<p>
\[
1 \notin B
\]
</p>

<h3>(4) Membership</h3>
<p>
\[
4 \notin A
\]
</p>

<hr>

<p>
Source: <em>A Book of Set Theory</em>, Charles C. Pinter
</p>
