<h2>Available books</h2>
<ul>
  <li>
    <strong>A Book of Set Theory</strong> — Charles C. Pinter
  </li>
</ul>

<h2>Sample formula</h2>
<p>
For any sets $A$ and $B$,
$$
A \cup B = \{ x \mid x \in A \text{ or } x \in B \}
$$
