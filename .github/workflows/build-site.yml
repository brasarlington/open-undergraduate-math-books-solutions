name: Pages test

on:
  push:
    branches: ["main"]

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create site
        run: |
          mkdir docs
          cat <<EOF > docs/index.html
          <!DOCTYPE html>
          <html>
          <body style="font-family:sans-serif">
            <h1>DEPLOY OK</h1>
            <p>If you see this, GitHub Pages works.</p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
