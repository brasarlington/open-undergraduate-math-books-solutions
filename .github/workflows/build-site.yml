name: Build site

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Pandoc
      run: sudo apt-get update && sudo apt-get install -y pandoc

    - name: Create docs directory
      run: mkdir -p docs

    - name: Build HTML from Markdown
      run: |
        pandoc books/pinter-set-theory/chapter-01/ex-1-1.md \
          -s \
          --mathjax \
          -o docs/pinter-set-theory.html

    - name: Commit generated site
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add docs
        git commit -m "Auto-build site" || echo "No changes"
        git push
