name: Publicar Web (Debug Mode)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python y Pandoc
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
      
      - run: |
          pip install mkdocs-material
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: 🔍 DIAGNÓSTICO DE ARCHIVOS (Mira el log de este paso)
        run: |
          echo "=== Listando estructura de carpetas ==="
          find solutions -maxdepth 4
          echo "======================================="

      - name: Convertir LaTeX a Markdown
        run: |
          # Usamos -iname para que encuentre .tex, .TeX, .TEX
          find solutions -type f -iname "*.tex" | while read source_file; do
            
            echo "--> Encontrado: $source_file"
            
            # Truco para normalizar ruta: quitar 'solutions/' del inicio
            # Si la carpeta se llama 'Solutions', esto fallaba antes. Ahora lo hacemos genérico.
            # Cortamos los primeros 10 caracteres (soluciones/) aprox o usamos sed
            rel_path=$(echo "$source_file" | sed -e "s|^solutions/||" -e "s|^Solutions/||")
            
            # Definir salida
            out_path="docs/${rel_path%.*}.md"
            mkdir -p "$(dirname "$out_path")"
            
            echo "    Destino: $out_path"
            
            pandoc "$source_file" \
              -f latex \
              -t markdown_github \
              --mathjax \
              -o "$out_path"
          done

      - name: Ajuste MathJax
        run: find docs -name "*.md" -print0 | xargs -0 sed -i '$a\\'

      - name: Publicar
        run: mkdocs gh-deploy --force
