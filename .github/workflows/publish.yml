name: Publicar Web Automática

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Instalar MkDocs y Material
        run: pip install mkdocs-material

      - name: Instalar Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convertir TODOS los archivos LaTeX a Markdown
        run: |
          # Este script busca cualquier archivo .tex dentro de 'solutions'
          find solutions -type f -name "*.tex" | while read source_file; do
            
            echo "Procesando archivo: $source_file"
            
            # 1. Quitamos el prefijo 'solutions/' para saber la ruta destino
            # Ejemplo: de 'solutions/set-theory/pinter/chapter1.tex' obtenemos 'set-theory/pinter/chapter1.tex'
            rel_path=${source_file#solutions/}
            
            # 2. Cambiamos la extensión de .tex a .md y agregamos el prefijo docs/
            # Destino: 'docs/set-theory/pinter/chapter1.md'
            out_path="docs/${rel_path%.tex}.md"
            
            # 3. Creamos la carpeta de destino si no existe
            mkdir -p "$(dirname "$out_path")"
            
            # 4. Convertimos usando Pandoc
            pandoc "$source_file" \
              -f latex \
              -t markdown_github \
              --mathjax \
              -o "$out_path"
              
            echo "Generado exitosamente: $out_path"
          done

      - name: Ajuste para MathJax
        # Agrega un salto de línea al final para evitar errores de renderizado
        run: find docs -name "*.md" -print0 | xargs -0 sed -i '$a\\'

      - name: Publicar en GitHub Pages
        run: mkdocs gh-deploy --force
