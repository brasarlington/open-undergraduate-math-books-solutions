name: Publicar Web (Debug Final)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python y Pandoc
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
      
      - run: |
          pip install mkdocs-material
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convertir LaTeX a Markdown (Con ruta corregida)
        run: |
          # 1. Buscar archivos .tex
          find solutions -type f -iname "*.tex" | while read source_file; do
            
            # Limpieza de ruta: Quitamos "./" si existe al inicio
            clean_source=$(echo "$source_file" | sed 's|^./||')
            
            # Limpieza clave: Quitamos "solutions/" del inicio para la ruta destino
            # De "solutions/set-theory/pinter/chapter1.tex" -> "set-theory/pinter/chapter1.tex"
            rel_path=$(echo "$clean_source" | sed 's|^solutions/||')
            
            # Definir destino final en docs/
            # De "set-theory/pinter/chapter1.tex" -> "docs/set-theory/pinter/chapter1.md"
            out_path="docs/${rel_path%.*}.md"
            
            # Crear carpeta destino
            mkdir -p "$(dirname "$out_path")"
            
            echo "🛠 CONVIRTIENDO:"
            echo "   Origen:  $clean_source"
            echo "   Destino: $out_path"
            
            # Ejecutar Pandoc
            pandoc "$clean_source" \
              -f latex \
              -t markdown_github \
              --mathjax \
              -o "$out_path"
              
          done

      - name: 🔍 VERIFICACIÓN
        run: |
          echo "=== CONTENIDO DE LA CARPETA DOCS ==="
          find docs -type f
          echo "===================================="

      - name: Publicar
        run: mkdocs gh-deploy --force

      - name: Ajuste MathJax
        run: find docs -name "*.md" -print0 | xargs -0 sed -i '$a\\'

      - name: Publicar
        run: mkdocs gh-deploy --force
