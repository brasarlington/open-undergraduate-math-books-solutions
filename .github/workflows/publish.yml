name: Publicar Web (Corrector de Mayúsculas)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python y Pandoc
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
      
      - run: |
          pip install mkdocs-material
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convertir LaTeX a Markdown
        run: |
          # Buscamos archivos .tex (case insensitive)
          find solutions -type f -iname "*.tex" | while read source_file; do
            
            # Limpieza 1: Quitar "./" del inicio si existe
            clean_source=$(echo "$source_file" | sed 's|^./||')
            
            # Limpieza 2 (LA CLAVE): Quitar 'solutions/' o 'Solutions/' del inicio
            # Esto asegura que la ruta final empiece con 'set-theory/...'
            rel_path=$(echo "$clean_source" | sed -E 's|^[Ss]olutions/||')
            
            # Definir destino: docs/set-theory/pinter/chapter1.md
            out_path="docs/${rel_path%.*}.md"
            
            mkdir -p "$(dirname "$out_path")"
            
            echo "Convirtiendo: $clean_source -> $out_path"
            
            pandoc "$clean_source" \
              -f latex \
              -t markdown_github \
              --mathjax \
              -o "$out_path"
          done

      - name: Ajuste MathJax
        run: find docs -name "*.md" -print0 | xargs -0 sed -i '$a\\'

      - name: Publicar
        run: mkdocs gh-deploy --force
