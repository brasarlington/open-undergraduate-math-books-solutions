name: Publicar Web (Final)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python y Pandoc
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
      
      - run: |
          pip install mkdocs-material
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convertir LaTeX a Markdown
        run: |
          find solutions -type f -iname "*.tex" | while read source_file; do
            # 1. Limpiar ruta origen
            clean_source=$(echo "$source_file" | sed 's|^./||')
            
            # 2. Calcular ruta destino (quitando 'solutions/' del inicio)
            # Esto convierte "solutions/set-theory/..." en "set-theory/..."
            rel_path=$(echo "$clean_source" | sed -E 's|^[Ss]olutions/||')
            
            out_path="docs/${rel_path%.*}.md"
            mkdir -p "$(dirname "$out_path")"
            
            echo "Convirtiendo: $clean_source -> $out_path"
            
            # 3. Ejecutar Pandoc (Usando 'gfm' en lugar de markdown_github)
            pandoc "$clean_source" \
              -f latex \
              -t gfm \
              --mathjax \
              -o "$out_path"
          done

      # Truco para asegurar que MathJax cargue bien
      - name: Ajuste MathJax
        run: find docs -name "*.md" -print0 | xargs -0 sed -i '$a\\'

      - name: Publicar
        run: mkdocs gh-deploy --force
