site_name: Open Math Solutions
site_url: https://brasarlington.github.io/open-undergraduate-math-books-solutions/
repo_url: https://github.com/brasarlington/open-undergraduate-math-books-solutions

theme:
  name: material
  language: es
  palette:
    scheme: default
    primary: indigo
    accent: teal
  features:
    - navigation.indexes
    - content.code.copy

# Configuración vital para Matemáticas
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - tables # Habilita tablas estilo Markdown

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Inicio: index.md
  - Teoría de Conjuntos:
    - 'Charles Pinter': set-theory/pinter/chapter1.md
